stages:
  data_ingestion:
    cmd: python src/emailClassifier/pipeline/data_ingestion_pipeline.py
    deps:
      - src/emailClassifier/components/data_ingestion.py
      - config/config.yaml
    outs:
      - artifact/data_ingestion/combined_data.csv


  data_validation:
    cmd: python src/emailClassifier/pipeline/data_validation_pipeline.py
    deps:
      - src/emailClassifier/components/data_validation.py
      - artifact/data_ingestion/combined_data.csv
      - config/config.yaml
    outs:
      - artifact/data_validation/status.txt


  data_transformation:
    cmd: python src/emailClassifier/pipeline/data_transform_pipeline.py
    deps: 
      - src/emailClassifier/components/data_transformation.py
      - artifact/data_ingestion/combined_data.csv
      - config/config.yaml
    outs:
      - artifact/data_transformation/x_train.pkl
      - artifact/data_transformation/x_val.pkl
      - artifact/data_transformation/y_train.pkl
      - artifact/data_transformation/y_val.pkl
      - artifact/data_transformation/vectorizer.pkl
  

  model_building:
    cmd: python src/emailClassifier/pipeline/model_build_pipeline.py
    deps:
      - src/emailClassifier/components/model_build.py
      - artifact/data_transformation/x_train.pkl
      - artifact/data_transformation/y_train.pkl
      - config/config.yaml
    params:
      - params.yaml:
          - SVC.C
          - SVC.kernel
          - SVC.gamma
    outs:
      - artifact/build_model/model.pkl
      - artifact/run_id.txt
      - artifact/model_version.txt
  

  model_evaluation:
    cmd: python src/emailClassifier/pipeline/model_eval_pipeline.py
    deps:
      - src/emailClassifier/components/mode_eval.py
      - artifact/data_transformation/x_val.pkl
      - artifact/data_transformation/y_val.pkl
      - artifact/build_model/model.pkl
      - config/config.yaml
    metrics:
      - artifact/model_evaluation/mertic.json:
          cache: false